---
# PixlStash Dataset Fetch — fetch by character
#
# This job downloads all images assigned to a character in PixlStash and writes
# them as jpg + txt caption pairs into the AI-Toolkit datasets folder.
# Once complete the dataset appears automatically in the AI-Toolkit UI.
#
# Run with:
#   python run.py config/pixlstash/fetch_character.yaml

job: extension
config:
  name: "pixlstash_fetch"
  process:
    - type: "pixlstash_fetch"

      # ---- PixlStash connection ------------------------------------------
      # URL of your running PixlStash instance
      pixlstash_url: "http://localhost:9537"

      # Personal API token — create one in PixlStash → Settings → API Tokens
      pixlstash_token: "paste-your-api-token-here"

      # ---- What to fetch ------------------------------------------------
      # "character" fetches all pictures assigned to a character via face detection
      source_type: "character"

      # Integer ID of the character (visible in the PixlStash URL when browsing)
      source_id: 1

      # ---- Caption options ----------------------------------------------
      # "description" — Florence-2 natural-language caption (best for FLUX / SD3)
      # "tags"        — WD14 comma-separated tags (best for SDXL / SD1.5)
      # "both"        — description first, then tags appended
      caption_mode: "description"

      # Optional trigger word prepended to every caption.
      # Leave blank or remove if you don't want one.
#      trigger_word: "mycharacter"

      # ---- Output -------------------------------------------------------
      # Subfolder name inside the AI-Toolkit datasets root.
      # Defaults to the character name from PixlStash if not set.
#      dataset_name: "my_character_lora"

      # Absolute path to the datasets root.
      # Defaults to <ai-toolkit root>/datasets — the same folder the UI watches.
#      datasets_root: "/absolute/path/to/datasets"

      # Set to true to re-download images that already exist on disk.
      overwrite: false
